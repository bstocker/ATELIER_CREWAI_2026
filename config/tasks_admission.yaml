formal_task:
  description: >
    Analyse les documents du processus formel admission-facturation.
    Identifie les étapes officielles, les acteurs impliqués, les règles, les validations,
    les dépendances et les points de vigilance. Ne parle pas des usages réels.
  expected_output: >
    Une fiche structurée du processus formel :
    titre, objectif, étapes formelles, acteurs impliqués, règles et validations,
    dépendances critiques, points de vigilance.

real_task:
  description: >
    Analyse les documents des usages réels admission-facturation.
    Décris comment le processus se déroule réellement, les contournements,
    les ajustements, les irritants, les contraintes terrain et les effets observés.
    Ne propose pas encore de solution.
  expected_output: >
    Une fiche structurée des pratiques réelles :
    déroulement réel, acteurs réellement mobilisés, contournements,
    irritants opérationnels, contraintes terrain, effets observés.

alignment_task:
  description: >
    Compare l'analyse formelle et l'analyse réelle du circuit admission-facturation.
    Identifie les désalignements socio-techniques, qualifie leur nature,
    formule des hypothèses explicatives, évalue les impacts opérationnels
    et propose des quick wins ainsi que des actions structurantes.
  expected_output: >
    Une note de réalignement contenant :
    synthèse du désalignement, écarts majeurs identifiés, causes probables,
    impacts opérationnels, quick wins, actions structurantes,
    point de vigilance de gouvernance.
